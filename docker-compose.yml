# Faculty Award Nomination System
#
# Full stack (UI + API): one command
#   docker compose up --build
#   Open http://localhost:8080 — nginx serves the React app and proxies /api to the API.
#
# Data pipeline jobs (run on demand, not started by default):
#   docker compose --profile pipeline run --rm extract-awards   # Excel → data/output/
#   docker compose --profile pipeline run --rm ingest-cvs       # PDFs → Pinecone
#   docker compose --profile pipeline run --rm match-awards       # CLI RAG match
#
# Prerequisites: copy .env.example to .env; mount ./data for cv, awards, output.

x-app-common: &app-common
  build: .
  env_file: .env
  volumes:
    - ./data:/app/data

services:
  api:
    <<: *app-common
    working_dir: /app/src
    command:
      [
        "uvicorn",
        "api_server:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
      ]
    environment:
      PYTHONPATH: /app/src

  web:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - api

  extract-awards:
    <<: *app-common
    profiles: [pipeline]
    command: ["src.award_text_extractor"]

  ingest-cvs:
    <<: *app-common
    profiles: [pipeline]
    command: ["src.ingest_cv"]

  match-awards:
    <<: *app-common
    profiles: [pipeline]
    command: ["src.rag_matching"]
